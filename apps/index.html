<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apps | Vital Intelligence Lab</title>
  <meta name="description" content="Vital Intelligence Lab が公開しているアプリ一覧です。" />

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0b1320;
      color: #eef4ff;
    }

    .container {
      width: min(1100px, 92%);
      margin: auto;
    }

    header {
      padding: 20px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    header a {
      color: #53d7ff;
      text-decoration: none;
      font-weight: bold;
    }

    h1 {
      margin: 40px 0 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .icon {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      margin-bottom: 12px;
    }

    .title {
      font-size: 1.2rem;
      font-weight: bold;
    }

    .desc {
      color: #c4cfdf;
      font-size: 0.95rem;
      margin: 8px 0 16px;
    }

    .btn {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 12px;
      background: #53d7ff;
      color: #001018;
      text-decoration: none;
      font-weight: bold;
    }

    footer {
      margin-top: 60px;
      padding: 30px 0;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 0.9rem;
    }

    footer a {
      margin-right: 15px;
      color: #c4cfdf;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <header class="container">
    <a href="/">← Home</a>
  </header>

  <main class="container">
    <h1>Apps</h1>
    <p>公開しているアプリ一覧です。</p>

    <div class="grid">

      <!-- swimLogPlus -->
      <div class="card">
        <img src="/assets/apps/swimlogplus/icon.png" class="icon" alt="swimLogPlus icon">

        <div class="title">SwimLog+</div>

        <div class="desc">
          水泳の記録・振り返り・フォーム確認を支援するアプリ
        </div>

        <a class="btn" href="/apps/swimlogplus/">詳細を見る</a>
      </div>

    </div>
  </main>

  <footer class="container">
    <a href="/support.html">Support</a>
    <a href="/privacy.html">Privacy</a>
    <a href="/terms.html">Terms</a>
    <a href="/contact.html">Contact</a>
  </footer>
</body>
</html>
